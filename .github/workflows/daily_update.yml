name: Daily Momentum Update

# Rebuilds the 4 momentum strategies (fresh prices + committed circuit/mcap state) and the
# mutual-fund comparison, then commits the refreshed data so the Streamlit Cloud app updates.
on:
  schedule:
    # 23:30 IST (18:00 UTC), Mon–Fri. Deliberately LATE: Indian mutual-fund NAVs are only
    # published ~10–11 PM IST, so an earlier run captured the previous day's NAV and left the
    # funds curve a day short. Market prices (settled since 3:30 PM) are also available by now,
    # so this one run captures same-day prices AND same-day NAVs together.
    - cron: '0 18 * * 1-5'
    # Safety net the next morning (08:30 IST) in case a fund published its NAV very late or the
    # evening run was delayed — the rebuild is a full refresh, so this simply backfills any gap.
    - cron: '0 3 * * 2-6'
  workflow_dispatch:            # manual "Run workflow" button

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-build.txt

      - name: Rebuild strategies + fund comparison
        run: python scripts/cloud_rebuild.py

      - name: Commit & push refreshed data
        run: |
          git config user.name  "Momentum Bot"
          git config user.email "momentum-bot@noreply.github.com"
          git add data/processed/    # small metric files only; prices base (data/state/) is refreshed periodically, not daily
          git diff --staged --quiet \
            && echo "No data changes — skipping commit." \
            || (git commit -m "data: momentum rebuild $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)
